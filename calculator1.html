<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="stylingcalc.css" />
  </head>
  <body>
    <div id="calculator">
      <input id="display" readonly />
      <div class="digits">
        <button onclick="allClearDisplay('AC')" class="color">AC</button>
        <button onclick="deleteDisplay('DE')" class="color">DE</button>
        <button onclick="clearDisplay('C')" class="color">C</button>
        <button onclick="appendToDisplay('%')" class="color">%</button>
      </div>
      <div class="digits">
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('/')" class="color">/</button>
      </div>
      <div class="digits">
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('*')" class="color">*</button>
      </div>
      <div class="digits">
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('0')" class="color">0</button>
      </div>
      <div class="digits">
        <button onclick="appendToDisplay('.')">.</button>
        <button onclick="appendToDisplay('/')">/</button>
        <button onclick="calculate('=')" id="equal" class="color">=</button>
      </div>
    </div>
